<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDM Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.2em;
            font-weight: 700;
            color: #1a1a1a;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-danger {
            background: #fff;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }

        .btn-green {
            background: #fff;
            color: #16a34a;
            border: 1px solid #86efac;
        }

        .search-input {
            padding: 8px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.85em;
            outline: none;
            width: 180px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #2563eb;
        }

        .auto-label {
            font-size: 0.8em;
            color: #999;
        }

        .main {
            max-width: 1100px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }

        @media (max-width: 700px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                gap: 12px;
                padding: 14px 16px;
            }
            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
            .tables-row {
                grid-template-columns: 1fr !important;
            }
        }

        .stat-box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e5e7eb;
        }

        .stat-box .num {
            font-size: 2em;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-box .lbl {
            font-size: 0.85em;
            color: #888;
        }

        .stat-box:nth-child(1) .num { color: #2563eb; }
        .stat-box:nth-child(2) .num { color: #16a34a; }
        .stat-box:nth-child(3) .num { color: #ea580c; }
        .stat-box:nth-child(4) .num { color: #7c3aed; }

        .tables-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .card-head {
            padding: 14px 18px;
            border-bottom: 1px solid #f0f0f0;
            font-weight: 600;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-head .cnt {
            background: #eff6ff;
            color: #2563eb;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 700;
        }

        .card-scroll {
            max-height: 420px;
            overflow-y: auto;
        }

        .card-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .card-scroll::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 16px;
            text-align: left;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
        }

        tbody td {
            padding: 10px 16px;
            font-size: 0.88em;
            border-bottom: 1px solid #f5f5f5;
        }

        tbody tr:hover {
            background: #f8faff;
        }

        .ip {
            font-family: 'SF Mono', 'Courier New', monospace;
            color: #2563eb;
            font-weight: 600;
            font-size: 0.85em;
        }

        .time {
            color: #888;
            font-size: 0.82em;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-1 {
            background: #f0fdf4;
            color: #16a34a;
        }

        .badge-multi {
            background: #fff7ed;
            color: #ea580c;
        }

        .yes {
            color: #16a34a;
            font-weight: 600;
        }

        .no {
            color: #ccc;
        }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: #bbb;
        }

        .empty-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .modal-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-bg.show {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }

        .modal h3 {
            margin-bottom: 8px;
            color: #dc2626;
            font-size: 1.1em;
        }

        .modal p {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btns button {
            padding: 9px 22px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
        }

        .modal-yes {
            background: #dc2626;
            color: #fff;
        }

        .modal-no {
            background: #f3f4f6;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TDM Admin Panel</h1>
        <div class="header-right">
            <input type="text" class="search-input" id="searchBox" placeholder="Search IP..." oninput="renderAll()">
            <span class="auto-label">Auto: <span id="countdown">5</span>s</span>
            <button class="btn btn-primary" onclick="renderAll()">Refresh</button>
            <button class="btn btn-green" onclick="exportCSV()">Export</button>
            <button class="btn btn-danger" onclick="showModal()">Clear All</button>
        </div>
    </div>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <h3>Clear All Data?</h3>
            <p>This will delete all download records permanently.</p>
            <div class="modal-btns">
                <button class="modal-yes" onclick="clearAll()">Yes, Clear</button>
                <button class="modal-no" onclick="hideModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="stats-row">
            <div class="stat-box">
                <div class="num" id="sUnique">0</div>
                <div class="lbl">Unique Downloads</div>
            </div>
            <div class="stat-box">
                <div class="num" id="sTotal">0</div>
                <div class="lbl">Total Attempts</div>
            </div>
            <div class="stat-box">
                <div class="num" id="sRepeat">0</div>
                <div class="lbl">Repeat Visitors</div>
            </div>
            <div class="stat-box">
                <div class="num" id="sLast">—</div>
                <div class="lbl">Last Download</div>
            </div>
        </div>

        <div class="tables-row">
            <div class="card">
                <div class="card-head">
                    <span>Unique IPs</span>
                    <span class="cnt" id="cntIP">0</span>
                </div>
                <div class="card-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>IP</th>
                                <th>First Seen</th>
                                <th>Attempts</th>
                            </tr>
                        </thead>
                        <tbody id="tbIP"></tbody>
                    </table>
                    <div class="empty" id="emIP" style="display:none">
                        <div class="empty-icon">📭</div>
                        <p>No downloads yet</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-head">
                    <span>Activity Log</span>
                    <span class="cnt" id="cntLog">0</span>
                </div>
                <div class="card-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>IP</th>
                                <th>Time</th>
                                <th>Counted</th>
                            </tr>
                        </thead>
                        <tbody id="tbLog"></tbody>
                    </table>
                    <div class="empty" id="emLog" style="display:none">
                        <div class="empty-icon">📭</div>
                        <p>No activity yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'tdm_downloads_db';

        function getDB() {
            try {
                const d = localStorage.getItem(DB_KEY);
                return d ? JSON.parse(d) : { ips: {}, log: [] };
            } catch (e) {
                return { ips: {}, log: [] };
            }
        }

        function fmtTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            const s = Math.floor((new Date() - d) / 1000);
            if (s < 60) return s + 's ago';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            if (s < 86400) return Math.floor(s / 3600) + 'h ago';
            if (s < 604800) return Math.floor(s / 86400) + 'd ago';
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function fmtFull(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function shortIP(ip) {
            if (!ip) return '—';
            return ip.length > 18 ? ip.substring(0, 15) + '...' : ip;
        }

        function renderAll() {
            const db = getDB();
            const search = (document.getElementById('searchBox').value || '').toLowerCase().trim();
            const ips = Object.keys(db.ips);
            const logs = db.log || [];

            // Stats
            let repeats = 0, lastT = null;
            ips.forEach(ip => {
                if (db.ips[ip].attempts > 1) repeats++;
                const t = db.ips[ip].lastAttempt || db.ips[ip].firstDownload;
                if (!lastT || new Date(t) > new Date(lastT)) lastT = t;
            });

            document.getElementById('sUnique').textContent = ips.length;
            document.getElementById('sTotal').textContent = logs.length;
            document.getElementById('sRepeat').textContent = repeats;
            document.getElementById('sLast').textContent = fmtTime(lastT);

            // IP Table
            let fIPs = search ? ips.filter(ip => ip.toLowerCase().includes(search)) : ips;
            fIPs.sort((a, b) => new Date(db.ips[b].firstDownload) - new Date(db.ips[a].firstDownload));

            document.getElementById('cntIP').textContent = fIPs.length;
            const tbIP = document.getElementById('tbIP');
            const emIP = document.getElementById('emIP');

            if (fIPs.length === 0) {
                tbIP.innerHTML = '';
                emIP.style.display = 'block';
            } else {
                emIP.style.display = 'none';
                tbIP.innerHTML = fIPs.map((ip, i) => {
                    const info = db.ips[ip];
                    const bc = info.attempts > 1 ? 'badge-multi' : 'badge-1';
                    return `<tr>
                        <td style="color:#bbb">${i + 1}</td>
                        <td class="ip" title="${ip}">${shortIP(ip)}</td>
                        <td class="time" title="${fmtFull(info.firstDownload)}">${fmtTime(info.firstDownload)}</td>
                        <td><span class="badge ${bc}">${info.attempts}×</span></td>
                    </tr>`;
                }).join('');
            }

            // Log Table
            let fLogs = search ? logs.filter(e => e.ip.toLowerCase().includes(search)) : logs;
            const rev = [...fLogs].reverse();

            document.getElementById('cntLog').textContent = fLogs.length;
            const tbLog = document.getElementById('tbLog');
            const emLog = document.getElementById('emLog');

            if (rev.length === 0) {
                tbLog.innerHTML = '';
                emLog.style.display = 'block';
            } else {
                emLog.style.display = 'none';
                tbLog.innerHTML = rev.map((e, i) => {
                    const cc = e.counted ? 'yes' : 'no';
                    const ct = e.counted ? '✓ Yes' : '— No';
                    return `<tr>
                        <td style="color:#bbb">${fLogs.length - i}</td>
                        <td class="ip" title="${e.ip}">${shortIP(e.ip)}</td>
                        <td class="time" title="${fmtFull(e.timestamp)}">${fmtTime(e.timestamp)}</td>
                        <td class="${cc}">${ct}</td>
                    </tr>`;
                }).join('');
            }
        }

        function showModal() {
            document.getElementById('modalBg').classList.add('show');
        }

        function hideModal() {
            document.getElementById('modalBg').classList.remove('show');
        }

        function clearAll() {
            localStorage.removeItem(DB_KEY);
            hideModal();
            renderAll();
        }

        function exportCSV() {
            const db = getDB();
            const ips = Object.keys(db.ips);
            if (ips.length === 0) { alert('No data to export.'); return; }

            let csv = 'IP,First Download,Last Attempt,Attempts\n';
            ips.forEach(ip => {
                const info = db.ips[ip];
                csv += `"${ip}","${info.firstDownload}","${info.lastAttempt || info.firstDownload}",${info.attempts}\n`;
            });

            csv += '\nIP,Timestamp,Counted\n';
            (db.log || []).forEach(e => {
                csv += `"${e.ip}","${e.timestamp}",${e.counted ? 'Yes' : 'No'}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tdm_report.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Auto refresh
        let cd = 5;
        setInterval(() => {
            cd--;
            if (cd <= 0) { cd = 5; renderAll(); }
            document.getElementById('countdown').textContent = cd;
        }, 1000);

        renderAll();
    </script>
</body>
</html>
