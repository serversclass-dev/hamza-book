<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDM - DR Hamza Abu Nawara</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }

        .book-cover {
            width: 100px;
            height: 130px;
            background: #2563eb;
            border-radius: 4px 10px 10px 4px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 3px 3px 15px rgba(37, 99, 235, 0.25);
        }

        .book-cover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4%;
            bottom: 4%;
            width: 3px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
        }

        .book-cover span {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .pdf-tag {
            position: absolute;
            bottom: -8px;
            right: -8px;
            background: #dc2626;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
        }

        h1 {
            font-size: 1.6em;
            color: #1a1a1a;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .author {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 1em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            text-decoration: none;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        .download-btn:active {
            background: #1e40af;
        }

        .download-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .download-btn.done {
            background: #16a34a;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9em;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="book-cover">
            <span>TDM</span>
            <div class="pdf-tag">PDF</div>
        </div>
        <h1>TDM Book</h1>
        <p class="author">By Dr.Hamza Abu Nawara</p>
        <button class="download-btn" id="downloadBtn" onclick="handleDownload()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            <span id="btnText">Download PDF</span>
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const DB_KEY = 'tdm_downloads_db';

        function getDB() {
            try {
                const data = localStorage.getItem(DB_KEY);
                return data ? JSON.parse(data) : { ips: {}, log: [] };
            } catch (e) {
                return { ips: {}, log: [] };
            }
        }

        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('fp', 2, 2);
            const cd = canvas.toDataURL().slice(-50);
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || '',
                cd
            ].join('|');
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash = hash & hash;
            }
            const p = Math.abs(hash);
            return [(p >> 24) & 255, (p >> 16) & 255, (p >> 8) & 255, p & 255].join('.');
        }

        let realIP = null;
        (async function () {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                realIP = data.ip;
            } catch (e) { }
        })();

        function getID() {
            return realIP || getFingerprint();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function handleDownload() {
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const ip = getID();
            const db = getDB();
            const now = new Date().toISOString();
            let isNew = false;

            if (!db.ips[ip]) {
                db.ips[ip] = { firstDownload: now, attempts: 1 };
                isNew = true;
            } else {
                db.ips[ip].attempts += 1;
                db.ips[ip].lastAttempt = now;
            }

            db.log.push({ ip: ip, timestamp: now, counted: isNew });
            saveDB(db);

            btn.classList.add('done');
            btnText.textContent = 'Downloading...';
            showToast('✓ Download started');

            setTimeout(() => {
                const link = document.createElement('a');
                link.href = 'TDM.pdf';
                link.download = 'TDM.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                btn.classList.remove('done');
                btnText.textContent = 'Download PDF';
            }, 800);
        }
    </script>
</body>
</html>
