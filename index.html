<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDM Book - Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.6);
        }

        .book-icon {
            width: 120px;
            height: 160px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border-radius: 8px 16px 16px 8px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: -5px 5px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }

        .book-icon:hover {
            transform: rotate(-5deg) scale(1.05);
        }

        .book-icon::before {
            content: '';
            position: absolute;
            left: 0;
            top: 5%;
            bottom: 5%;
            width: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .book-icon span {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .book-icon .pdf-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5);
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1em;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .download-btn.downloading {
            pointer-events: none;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
        }

        .stats {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(46, 204, 113, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .book-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.6em;
            }
            .download-btn {
                padding: 15px 35px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="book-card">
            <div class="book-icon">
                <span>TDM</span>
                <div class="pdf-badge">PDF</div>
            </div>
            <h1>TDM Book</h1>
            <p class="subtitle">Click the button below to download your copy of TDM.pdf</p>
            <button class="download-btn" id="downloadBtn" onclick="handleDownload()">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                <span id="btnText">Download PDF</span>
            </button>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="downloadCount">—</div>
                    <div class="stat-label">Unique Downloads</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">PDF</div>
                    <div class="stat-label">Format</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✓ Download recorded! Thank you.</div>

    <script>
        // ============================================
        // IN-MEMORY DATABASE (shared via localStorage)
        // ============================================
        const DB_KEY = 'tdm_downloads_db';

        function getDB() {
            try {
                const data = localStorage.getItem(DB_KEY);
                return data ? JSON.parse(data) : { ips: {}, log: [] };
            } catch (e) {
                return { ips: {}, log: [] };
            }
        }

        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        // Get a pseudo-unique fingerprint (since we can't get real IP from pure HTML)
        // This uses a combination of browser properties as a "fake IP" / fingerprint
        function getVisitorFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('fingerprint', 2, 2);
            const canvasData = canvas.toDataURL();

            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 'unknown',
                canvasData.slice(-50)
            ].join('|');

            // Simple hash
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                const char = raw.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            // Format as fake IP-like identifier
            const positive = Math.abs(hash);
            return [
                (positive >> 24) & 255,
                (positive >> 16) & 255,
                (positive >> 8) & 255,
                positive & 255
            ].join('.');
        }

        // Also try to get real public IP from a free API
        let realIP = null;

        async function fetchRealIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                realIP = data.ip;
            } catch (e) {
                // If blocked, we'll use fingerprint
                realIP = null;
            }
        }

        fetchRealIP();

        function getIdentifier() {
            return realIP || getVisitorFingerprint();
        }

        // Load current count on page load
        function updateDisplayCount() {
            const db = getDB();
            const uniqueCount = Object.keys(db.ips).length;
            document.getElementById('downloadCount').textContent = uniqueCount;
        }

        updateDisplayCount();

        // ============================================
        // DOWNLOAD HANDLER
        // ============================================
        function handleDownload() {
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const toast = document.getElementById('toast');

            // Get identifier
            const ip = getIdentifier();
            const db = getDB();
            const now = new Date().toISOString();
            let isNew = false;

            // Check if this IP already exists
            if (!db.ips[ip]) {
                db.ips[ip] = {
                    firstDownload: now,
                    attempts: 1
                };
                isNew = true;
            } else {
                db.ips[ip].attempts += 1;
                db.ips[ip].lastAttempt = now;
            }

            // Log every attempt (for admin detail view)
            db.log.push({
                ip: ip,
                timestamp: now,
                counted: isNew
            });

            saveDB(db);
            updateDisplayCount();

            // Button animation
            btn.classList.add('downloading');
            btnText.textContent = 'Downloading...';

            // Show toast
            toast.textContent = isNew
                ? '✓ Download recorded! Thank you.'
                : '✓ Already counted — downloading again.';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);

            // Trigger actual file download
            setTimeout(() => {
                const link = document.createElement('a');
                link.href = 'TDM.pdf'; // <-- Make sure TDM.pdf is in the same folder
                link.download = 'TDM.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                btn.classList.remove('downloading');
                btnText.textContent = 'Download PDF';
            }, 1000);
        }

        // ============================================
        // PARTICLES BACKGROUND
        // ============================================
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.opacity = Math.random() * 0.5;
                container.appendChild(p);
            }
        })();
    </script>
</body>
</html>
